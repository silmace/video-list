name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            goarm: ""
            binary_name: video-list-macos-arm64
          - goos: windows
            goarch: amd64
            goarm: ""
            binary_name: video-list-windows-amd64.exe
          - goos: linux
            goarch: amd64
            goarm: ""
            binary_name: video-list-linux-amd64
          - goos: linux
            goarch: arm64
            goarm: ""
            binary_name: video-list-linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            binary_name: video-list-linux-armv7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.x
          cache: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Build binary (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          mkdir -p release
          go build -trimpath -ldflags="-s -w" -o "release/${{ matrix.binary_name }}" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: release/${{ matrix.binary_name }}

  publish-release:
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/video-list-macos-arm64
            release/video-list-windows-amd64.exe
            release/video-list-linux-amd64
            release/video-list-linux-arm64
            release/video-list-linux-armv7
            release/checksums.txt
          generate_release_notes: true
